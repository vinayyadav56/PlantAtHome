name: CI/CD → Staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

jobs:
  test:
    name: PHP Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: plantathome_test
        ports: [3306:3306]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_mysql, exif, gd, intl, zip, bcmath, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy staging env
        run: cp .env.staging.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: plantathome_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: PHP syntax check
        run: find app -name '*.php' | xargs php -l | grep -v 'No syntax errors' || true

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Configure and Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: 5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e
          RAILWAY_PROJECT_ID: 3261e461-4321-4974-b86c-6e0d1675f032
          RAILWAY_ENV_ID: a12e9f73-752a-4556-a065-b6a7657bae63
        run: |
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"mutation { variableCollectionUpsert(input: { projectId: \\\"$RAILWAY_PROJECT_ID\\\", environmentId: \\\"$RAILWAY_ENV_ID\\\", serviceId: \\\"$RAILWAY_SERVICE_ID\\\", variables: { PORT: \\\"3000\\\" } }) }\"}" && echo "PORT=3000 set"

          DEPLOY_RESP=$(curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"mutation { serviceInstanceDeployV2(serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENV_ID\\\") }\"}")
          echo "Deploy: $DEPLOY_RESP"

          DEPLOY_ID=$(echo "$DEPLOY_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['serviceInstanceDeployV2'])" 2>/dev/null)
          echo "Deploy ID: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait and check deployment logs
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          DEPLOY_ID="${{ env.DEPLOY_ID }}"
          echo "Checking deployment: $DEPLOY_ID"
          echo "Waiting 4 minutes for Docker build..."
          sleep 240

          echo "=== Deployment Status ==="
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"{ deployment(id: \\\"$DEPLOY_ID\\\") { id status } }\"}" 2>/dev/null || echo "Status query failed"

          echo ""
          echo "=== All Recent Deployments ==="
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{"query": "{ deployments(input: { serviceId: \"5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e\" }) { edges { node { id status createdAt } } } }"}' | python3 -c "import sys,json; d=json.load(sys.stdin); [print(e['node']['status'], e['node']['createdAt'][:19], e['node']['id'][:8]) for e in d['data']['deployments']['edges'][:5]]" 2>/dev/null

          echo ""
          echo "=== Health check from GitHub Actions (US East) ==="
          curl -s -w "\nHTTP: %{http_code}\n" --max-time 10 \
            "https://plantathome-api-production.up.railway.app/api/health" 2>/dev/null || echo "curl failed"
