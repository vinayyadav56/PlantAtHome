name: API – Staging Deploy

# ─── Auto-deploy on push to staging; manual trigger also available ────────────
# Push to the staging branch → auto-deploys to Railway (no confirm needed).
# Manual run via workflow_dispatch → branch selector + confirm required.
on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (any branch allowed for staging)'
        required: false
        default: 'staging'
        type: string
      confirm:
        description: 'Type "deploy" to confirm staging deployment'
        required: false
        default: ''
        type: string

jobs:
  # ── 1. Security & Vulnerability Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}
          fetch-depth: 0        # full history for secret scanning

      # Detect secrets / credentials accidentally committed
      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_mysql, exif, gd, intl, zip, bcmath, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --optimize-autoloader --no-interaction

      # Known CVEs in composer packages
      - name: PHP dependency vulnerability scan (composer audit)
        run: composer audit || true

      # PHP syntax errors across the whole app
      - name: PHP syntax check
        run: find app -name '*.php' | xargs php -l | grep -v 'No syntax errors' || true

      # Filesystem CVE scan — fails on HIGH or CRITICAL findings
      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: table

  # ── 2. Tests ──────────────────────────────────────────────────────────────────
  test:
    name: PHP Test
    runs-on: ubuntu-latest
    needs: security

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: plantathome_test
        ports: [3306:3306]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_mysql, exif, gd, intl, zip, bcmath, opcache
          coverage: none

      - name: Install dependencies (no-dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy staging env
        run: cp .env.staging.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: plantathome_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

  # ── 3. Deploy to Fly.io ───────────────────────────────────────────────────────
  # On push: auto-runs. On manual: runs only if user typed "deploy".
  deploy:
    name: Deploy → Fly.io (Staging)
    runs-on: ubuntu-latest
    needs: [security, test]
    if: inputs.confirm == 'deploy' || github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: fly deploy --remote-only --wait-timeout 600
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          echo "Waiting 30s for container to start..."
          sleep 30
          for i in 1 2 3 4 5; do
            R=$(curl -s -w "\nHTTP:%{http_code}" --max-time 15 \
              "https://plantathome-api.fly.dev/api/health" 2>/dev/null)
            echo "Attempt $i: $R"
            echo "$R" | grep -q "HTTP:200" && echo "PASS" && exit 0
            sleep 20
          done
          echo "FAIL — health check did not return 200"
          exit 1
