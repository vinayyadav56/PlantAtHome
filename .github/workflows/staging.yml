name: CI/CD → Staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

jobs:
  test:
    name: PHP Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: plantathome_test
        ports: [3306:3306]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_mysql, exif, gd, intl, zip, bcmath, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy staging env
        run: cp .env.staging.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: plantathome_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: PHP syntax check
        run: find app -name '*.php' | xargs php -l | grep -v 'No syntax errors' || true

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - name: Update startCommand and wait for Railway auto-deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 3261e461-4321-4974-b86c-6e0d1675f032
          RAILWAY_SERVICE_ID: 5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e
          RAILWAY_ENV_ID: a12e9f73-752a-4556-a065-b6a7657bae63
        run: |
          SID="$RAILWAY_SERVICE_ID"
          EID="$RAILWAY_ENV_ID"
          API="https://backboard.railway.app/graphql/v2"
          HDR_AUTH="Authorization: Bearer $RAILWAY_TOKEN"
          HDR_CT="Content-Type: application/json"

          echo "=== Update startCommand ==="
          CMD="/bin/sh /app/.railway/start.sh"
          MUTATION='mutation { serviceInstanceUpdate(serviceId: "'"$SID"'", environmentId: "'"$EID"'", input: { builder: NIXPACKS, startCommand: "'"$CMD"'" }) }'
          QUERY=$(MUTATION="$MUTATION" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
          curl -s -X POST "$API" -H "$HDR_CT" -H "$HDR_AUTH" -d "$QUERY"
          echo ""

          echo "=== Snapshot current latest deployment ==="
          BEFORE_ID=$(curl -s -X POST "$API" -H "$HDR_CT" -H "$HDR_AUTH" \
            -d '{"query": "{ deployments(input: { serviceId: \"'"$SID"'\" }) { edges { node { id status } } } }"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); edges=d['data']['deployments']['edges']; print(edges[0]['node']['id'] if edges else '')" 2>/dev/null)
          echo "Baseline deployment: $BEFORE_ID"

          echo "=== Polling for Railway auto-deploy (up to 10 min) ==="
          DEPLOY_ID=""
          for i in $(seq 1 20); do
            sleep 30
            LATEST_ID=$(curl -s -X POST "$API" -H "$HDR_CT" -H "$HDR_AUTH" \
              -d '{"query": "{ deployments(input: { serviceId: \"'"$SID"'\" }) { edges { node { id status } } } }"}' \
              | python3 -c "import sys,json; d=json.load(sys.stdin); edges=d['data']['deployments']['edges']; print(edges[0]['node']['id'] if edges else '')" 2>/dev/null)
            echo "Poll $i: latest=$LATEST_ID"
            if [ -n "$LATEST_ID" ] && [ "$LATEST_ID" != "$BEFORE_ID" ]; then
              DEPLOY_ID="$LATEST_ID"
              echo "New deployment detected: $DEPLOY_ID"
              break
            fi
          done

          if [ -z "$DEPLOY_ID" ]; then
            echo "No auto-deploy detected after 10 min — falling back to serviceInstanceDeployV2"
            DEPLOY_MUT='mutation { serviceInstanceDeployV2(serviceId: "'"$SID"'", environmentId: "'"$EID"'") }'
            DEPLOY_Q=$(MUTATION="$DEPLOY_MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
            RESP=$(curl -s -X POST "$API" -H "$HDR_CT" -H "$HDR_AUTH" -d "$DEPLOY_Q")
            echo "$RESP"
            DEPLOY_ID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['serviceInstanceDeployV2'])" 2>/dev/null)
          fi

          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
          echo "Monitoring deploy: $DEPLOY_ID"

      - name: Wait for build then check logs and health
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: 5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e
        run: |
          DEPLOY_ID="${{ env.DEPLOY_ID }}"
          echo "Monitoring deploy ID: $DEPLOY_ID"
          echo "Waiting 10 minutes for Railway build + start..."
          sleep 600

          echo "=== Deployment status ==="
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"{ deployment(id: \\\"$DEPLOY_ID\\\") { status } }\"}" 2>/dev/null
          echo ""

          echo "=== Recent deployments ==="
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{"query": "{ deployments(input: { serviceId: \"5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e\" }) { edges { node { id status createdAt } } } }"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(e['node']['status'], e['node']['createdAt'][:19], e['node']['id'][:8]) for e in d['data']['deployments']['edges'][:3]]" 2>/dev/null
          echo ""

          echo "=== Container logs for new deploy (last 100) ==="
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"{ deploymentLogs(deploymentId: \\\"$DEPLOY_ID\\\", limit: 100) { message severity } }\"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(l.get('severity','?'), l.get('message','')) for l in d.get('data',{}).get('deploymentLogs',[])]" 2>/dev/null || echo "Log query failed"
          echo ""

          echo "=== Health check ==="
          for i in 1 2 3 4 5; do
            RESULT=$(curl -s -w "\nHTTP:%{http_code}" --max-time 15 "https://plantathome-api-production.up.railway.app/api/health" 2>/dev/null)
            echo "Attempt $i: $RESULT"
            echo "$RESULT" | grep -q "HTTP:200" && echo "SUCCESS!" && break
            sleep 15
          done
