name: Fix Railway Domain

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

jobs:
  test:
    name: PHP Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: plantathome_test
        ports: [3306:3306]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_mysql, exif, gd, intl, zip, bcmath, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy staging env
        run: cp .env.staging.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: plantathome_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: PHP syntax check
        run: find app -name '*.php' | xargs php -l | grep -v 'No syntax errors' || true

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Fix domain and deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: 5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e
          RAILWAY_PROJECT_ID: 3261e461-4321-4974-b86c-6e0d1675f032
          RAILWAY_ENV_ID: a12e9f73-752a-4556-a065-b6a7657bae63
        run: |
          # Get existing domain ID
          echo "=== Getting existing domain ==="
          DOMAIN_INFO=$(curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"{ service(id: \\\"$RAILWAY_SERVICE_ID\\\") { serviceInstances { edges { node { domains { serviceDomains { id domain } } } } } } }\"}")
          echo "Domain info: $DOMAIN_INFO"

          # Extract domain ID
          DOMAIN_ID=$(echo "$DOMAIN_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); insts=d['data']['service']['serviceInstances']['edges']; sds=[sd for inst in insts for sd in inst['node']['domains']['serviceDomains']]; print(sds[0]['id'] if sds else 'NONE')" 2>/dev/null || echo "NONE")
          echo "Domain ID: $DOMAIN_ID"

          # Delete existing domain
          if [ "$DOMAIN_ID" != "NONE" ] && [ -n "$DOMAIN_ID" ]; then
            echo "Deleting existing domain..."
            DEL_RESP=$(curl -sf -X POST https://backboard.railway.app/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -d "{\"query\": \"mutation { serviceDomainDelete(id: \\\"$DOMAIN_ID\\\") }\"}")
            echo "Delete response: $DEL_RESP"
            sleep 5
          fi

          # Set PORT env var
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"mutation { variableCollectionUpsert(input: { projectId: \\\"$RAILWAY_PROJECT_ID\\\", environmentId: \\\"$RAILWAY_ENV_ID\\\", serviceId: \\\"$RAILWAY_SERVICE_ID\\\", variables: { PORT: \\\"3000\\\" } }) }\"}" && echo "PORT=3000 set"

          # Trigger new deploy
          DEPLOY_RESP=$(curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"mutation { serviceInstanceDeployV2(serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENV_ID\\\") }\"}")
          echo "Deploy: $DEPLOY_RESP"
          DEPLOY_ID=$(echo "$DEPLOY_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['serviceInstanceDeployV2'])" 2>/dev/null)
          echo "Deploy ID: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Create new domain and wait for health
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: 5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e
          RAILWAY_ENV_ID: a12e9f73-752a-4556-a065-b6a7657bae63
        run: |
          echo "Waiting 5 minutes for Docker build..."
          sleep 300

          # Create new domain
          echo "=== Creating new domain ==="
          NEW_DOMAIN=$(curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{\"query\": \"mutation { serviceDomainCreate(input: { serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENV_ID\\\" }) { id domain } }\"}")
          echo "New domain: $NEW_DOMAIN"

          DOMAIN=$(echo "$NEW_DOMAIN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['serviceDomainCreate']['domain'])" 2>/dev/null || echo "unknown")
          echo "Railway API URL: https://$DOMAIN/api/health"

          # Check deployment status
          echo "=== Deployment Status ==="
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{"query": "{ deployments(input: { serviceId: \"5bd0c7cc-49fa-4f3b-a30b-d8df07909e7e\" }) { edges { node { id status createdAt } } } }"}' | python3 -c "import sys,json; d=json.load(sys.stdin); [print(e['node']['status'], e['node']['createdAt'][:19], e['node']['id'][:8]) for e in d['data']['deployments']['edges'][:3]]" 2>/dev/null

          # Health check from GitHub Actions (US East)
          echo "=== Health check from GitHub Actions (US East) ==="
          for i in $(seq 1 3); do
            CODE=$(curl -s -w "%{http_code}" -o /tmp/hh.txt --max-time 15 "https://$DOMAIN/api/health" 2>/dev/null)
            BODY=$(cat /tmp/hh.txt)
            echo "Attempt $i: HTTP $CODE: $BODY"
            [ "$CODE" = "200" ] || [ "$CODE" = "500" ] && break
            sleep 20
          done
