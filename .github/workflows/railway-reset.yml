name: Railway – Full Reset

# ─── DANGER: deletes ALL Railway services and data ────────────────────────────
# Run this to get a completely fresh Railway environment (new MySQL + API service).
# After completion, the workflow auto-triggers "API – Staging Deploy".
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "reset" to confirm — THIS DELETES ALL RAILWAY DATA'
        required: true
        type: string

jobs:
  railway-reset:
    name: Delete & Recreate Railway Services
    runs-on: ubuntu-latest
    if: inputs.confirm == 'reset'
    environment: staging
    permissions:
      contents: write
      workflows: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      # ── 1. Delete ALL existing services in the project ───────────────────────
      - name: Delete all existing services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          API="https://backboard.railway.app/graphql/v2"
          PID="3261e461-4321-4974-b86c-6e0d1675f032"

          # Query all services in the project
          QUERY='{ project(id: "'"$PID"'") { services { edges { node { id name } } } } }'
          Q=$(QUERY="$QUERY" python3 -c 'import json,os; print(json.dumps({"query": os.environ["QUERY"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Services found: $RESP"

          SERVICE_IDS=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              edges = json.load(sys.stdin)['data']['project']['services']['edges']
              for e in edges:
                  print(e['node']['id'])
          except: pass
          " 2>/dev/null)

          for SID in $SERVICE_IDS; do
            echo "Deleting service: $SID"
            MUT='mutation { serviceDelete(id: "'"$SID"'") }'
            Q=$(MUTATION="$MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
            RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
            echo "Delete service $SID: $RESP"
          done

      # ── 2. Find and delete MySQL plugin ─────────────────────────────────────
      - name: Delete MySQL plugins
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          API="https://backboard.railway.app/graphql/v2"
          PID="3261e461-4321-4974-b86c-6e0d1675f032"
          QUERY='{ project(id: "'"$PID"'") { plugins { edges { node { id name } } } } }'
          Q=$(QUERY="$QUERY" python3 -c 'import json,os; print(json.dumps({"query": os.environ["QUERY"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Plugins found: $RESP"

          PLUGIN_IDS=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              edges = json.load(sys.stdin)['data']['project']['plugins']['edges']
              for e in edges:
                  print(e['node']['id'])
          except: pass
          " 2>/dev/null)

          for PLUGIN_ID in $PLUGIN_IDS; do
            echo "Deleting plugin: $PLUGIN_ID"
            MUT='mutation { pluginDelete(id: "'"$PLUGIN_ID"'") }'
            Q=$(MUTATION="$MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
            RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
            echo "Delete plugin: $RESP"
          done

      - name: Wait for deletions to propagate
        run: sleep 10

      # ── 3. Create new MySQL service (Docker image, pluginCreate requires owner token) ──
      - name: Create new MySQL service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          API="https://backboard.railway.app/graphql/v2"
          PID="3261e461-4321-4974-b86c-6e0d1675f032"
          # Create MySQL as a regular service with mysql:8.0 image
          MUT='mutation { serviceCreate(input: { projectId: "'"$PID"'", name: "MySQL" }) { id } }'
          Q=$(MUTATION="$MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Create MySQL service: $RESP"
          MYSQL_SID=$(echo "$RESP" | python3 -c "
          import sys, json
          try: print(json.load(sys.stdin)['data']['serviceCreate']['id'])
          except: print('')
          " 2>/dev/null)
          echo "MYSQL_SID=$MYSQL_SID" >> $GITHUB_ENV
          echo "MySQL service ID: $MYSQL_SID"

      # ── 4. Create new API service ────────────────────────────────────────────
      - name: Create new API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          API="https://backboard.railway.app/graphql/v2"
          PID="3261e461-4321-4974-b86c-6e0d1675f032"
          MUT='mutation { serviceCreate(input: { projectId: "'"$PID"'", name: "plantathome-api" }) { id } }'
          Q=$(MUTATION="$MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Create API service: $RESP"
          NEW_SID=$(echo "$RESP" | python3 -c "
          import sys, json
          try: print(json.load(sys.stdin)['data']['serviceCreate']['id'])
          except: print('')
          " 2>/dev/null)
          echo "NEW_SID=$NEW_SID" >> $GITHUB_ENV
          echo "New API service ID: $NEW_SID"

      # ── 5. Get environment ID ────────────────────────────────────────────────
      - name: Get environment ID
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          API="https://backboard.railway.app/graphql/v2"
          PID="3261e461-4321-4974-b86c-6e0d1675f032"
          QUERY='{ project(id: "'"$PID"'") { environments { edges { node { id name } } } } }'
          Q=$(QUERY="$QUERY" python3 -c 'import json,os; print(json.dumps({"query": os.environ["QUERY"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Environments: $RESP"
          NEW_EID=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              edges = json.load(sys.stdin)['data']['project']['environments']['edges']
              print(edges[0]['node']['id'] if edges else '')
          except: print('')
          " 2>/dev/null)
          echo "NEW_EID=$NEW_EID" >> $GITHUB_ENV
          echo "Environment ID: $NEW_EID"

      # ── 6a. Configure MySQL service with image + env vars ───────────────────────
      - name: Configure MySQL service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          API="https://backboard.railway.app/graphql/v2"
          PID="3261e461-4321-4974-b86c-6e0d1675f032"
          MYSQL_SID="${{ env.MYSQL_SID }}"
          NEW_EID="${{ env.NEW_EID }}"
          if [ -z "$MYSQL_SID" ]; then echo "WARN: MYSQL_SID empty, skipping MySQL config"; exit 0; fi

          # Set MySQL docker image
          MUT='mutation { serviceInstanceUpdate(serviceId: "'"$MYSQL_SID"'", environmentId: "'"$NEW_EID"'", input: { source: { image: "mysql:8.0" } }) }'
          Q=$(MUTATION="$MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Set MySQL image: $RESP"

          # Set MySQL env vars
          ROOT_PASS="${MYSQL_ROOT_PASSWORD:-PlantAtHomeRoot2024}"
          DB_PASS="${MYSQL_PASSWORD:-PlantAtHome2024}"
          PAYLOAD=$(PID="$PID" EID="$NEW_EID" SID="$MYSQL_SID" RPASS="$ROOT_PASS" DPASS="$DB_PASS" python3 -c 'import json,os; q="mutation($i: VariableCollectionUpsertInput!) { variableCollectionUpsert(input: $i) }"; v={"MYSQL_ROOT_PASSWORD":os.environ["RPASS"],"MYSQL_DATABASE":"railway","MYSQL_USER":"railway","MYSQL_PASSWORD":os.environ["DPASS"]}; inp={"projectId":os.environ["PID"],"environmentId":os.environ["EID"],"serviceId":os.environ["SID"],"variables":v}; print(json.dumps({"query":q,"variables":{"i":inp}}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$PAYLOAD")
          echo "Set MySQL env vars: $RESP"

      # ── 6b. Set environment variables + start command on API service ─────────
      - name: Set env vars and start command on new service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          API="https://backboard.railway.app/graphql/v2"
          PID="3261e461-4321-4974-b86c-6e0d1675f032"
          NEW_SID="${{ env.NEW_SID }}"
          MYSQL_SID="${{ env.MYSQL_SID }}"
          DB_PASS="${MYSQL_PASSWORD:-PlantAtHome2024}"
          # MySQL hostname: service_name.railway.internal (Railway internal networking)
          MYSQL_HOST="mysql.railway.internal"
          if [ -n "$MYSQL_SID" ]; then
            MYSQL_HOST="MySQL.railway.internal"
          fi
          NEW_EID="${{ env.NEW_EID }}"

          # Set env vars on API service (includes MySQL connection pointing to internal MySQL service)
          PAYLOAD=$(PID="$PID" EID="$NEW_EID" SID="$NEW_SID" MHOST="$MYSQL_HOST" MPASS="$DB_PASS" ADMIN_PASSWORD="$ADMIN_PASSWORD" RAZORPAY_SECRET="$RAZORPAY_SECRET" SENDGRID_API_KEY="$SENDGRID_API_KEY" python3 -c 'import json,os; q="mutation($i: VariableCollectionUpsertInput!) { variableCollectionUpsert(input: $i) }"; v={"ADMIN_EMAIL":"yadavvinay9996@gmail.com","ADMIN_NAME":"Vinay Yadav","ADMIN_PASSWORD":os.environ.get("ADMIN_PASSWORD",""),"RAZORPAY_SECRET":os.environ.get("RAZORPAY_SECRET",""),"SENDGRID_API_KEY":os.environ.get("SENDGRID_API_KEY",""),"MYSQLHOST":os.environ.get("MHOST",""),"MYSQLDATABASE":"railway","MYSQLUSER":"railway","MYSQLPASSWORD":os.environ.get("MPASS",""),"MYSQLPORT":"3306"}; inp={"projectId":os.environ["PID"],"environmentId":os.environ["EID"],"serviceId":os.environ["SID"],"variables":v}; print(json.dumps({"query":q,"variables":{"i":inp}}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$PAYLOAD")
          echo "Set env vars: $RESP"

          # Connect to GitHub repo + set start command + builder in one call
          # source.repo connects the service to GitHub so Railway can auto-deploy on push
          MUT='mutation { serviceInstanceUpdate(serviceId: "'"$NEW_SID"'", environmentId: "'"$NEW_EID"'", input: { source: { repo: "vinayyadav56/PlantAtHome" }, builder: NIXPACKS, startCommand: "/start.sh" }) }'
          Q=$(MUTATION="$MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Set start command + GitHub source: $RESP"

      # ── 7. Update staging.yml with new IDs and push ──────────────────────────
      - name: Update service IDs in staging.yml
        env:
          NEW_SID: ${{ env.NEW_SID }}
          NEW_EID: ${{ env.NEW_EID }}
        run: |
          if [ -z "$NEW_SID" ]; then
            echo "WARNING: NEW_SID is empty — skipping staging.yml update"
            exit 0
          fi
          # Extract the current SID and EID from the assignment lines in staging.yml
          OLD_SID=$(grep -m1 'SID="' .github/workflows/staging.yml | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          OLD_EID=$(grep -m1 'EID="' .github/workflows/staging.yml | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          echo "OLD_SID=$OLD_SID  OLD_EID=$OLD_EID"
          if [ -n "$OLD_SID" ] && [ "$OLD_SID" != "$NEW_SID" ]; then
            sed -i "s/$OLD_SID/$NEW_SID/g" .github/workflows/staging.yml
            echo "Replaced SID: $OLD_SID → $NEW_SID"
          fi
          if [ -n "$OLD_EID" ] && [ "$OLD_EID" != "$NEW_EID" ] && [ -n "$NEW_EID" ]; then
            sed -i "s/$OLD_EID/$NEW_EID/g" .github/workflows/staging.yml
            echo "Replaced EID: $OLD_EID → $NEW_EID"
          fi

      - name: Commit and push updated staging.yml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/staging.yml
          if git diff --staged --quiet; then
            echo "No changes to staging.yml"
          else
            git commit -m "ci: update Railway service/env IDs after full reset [skip ci]"
            git push origin staging
          fi

      # ── 8. Trigger deployment via GraphQL ────────────────────────────────────
      - name: Trigger deployment on new Railway service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          NEW_SID="${{ env.NEW_SID }}"
          NEW_EID="${{ env.NEW_EID }}"
          API="https://backboard.railway.app/graphql/v2"
          if [ -z "$NEW_SID" ]; then
            echo "ERROR: NEW_SID is empty — cannot deploy"
            exit 1
          fi
          MUT='mutation { serviceInstanceDeployV2(serviceId: "'"$NEW_SID"'", environmentId: "'"$NEW_EID"'") }'
          Q=$(MUTATION="$MUT" python3 -c 'import json,os; print(json.dumps({"query": os.environ["MUTATION"]}))')
          RESP=$(curl -s -X POST "$API" -H "Content-Type: application/json" -H "Authorization: Bearer $RAILWAY_TOKEN" -d "$Q")
          echo "Deploy triggered: $RESP"
          DEPLOY_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['serviceInstanceDeployV2'])" 2>/dev/null)
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
          echo "Deployment ID: $DEPLOY_ID"
          echo "Railway is building the image and will run marvel:install on first boot."

      # ── 9. Wait for build + health check ─────────────────────────────────────
      - name: Wait for build + health check (up to 12 min)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          DEPLOY_ID="${{ env.DEPLOY_ID }}"
          echo "Waiting 10 min for Railway nixpacks build + marvel:install to complete..."
          sleep 600

          if [ -n "$DEPLOY_ID" ]; then
            echo "=== Deployment status ==="
            curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -d "{\"query\":\"{ deployment(id:\\\"$DEPLOY_ID\\\"){status}}\"}"
            echo ""

            echo "=== Container logs (last 50) ==="
            curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -d "{\"query\":\"{ deploymentLogs(deploymentId:\\\"$DEPLOY_ID\\\",limit:50){message severity}}\"}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(l.get('severity','?'), l.get('message','')) for l in d.get('data',{}).get('deploymentLogs',[])]" 2>/dev/null
            echo ""
          fi

          DOMAIN="plantathome-api-production.up.railway.app"
          echo "=== Health check: https://$DOMAIN/api/health ==="
          for i in 1 2 3 4 5; do
            R=$(curl -s -w "\nHTTP:%{http_code}" --max-time 15 "https://$DOMAIN/api/health" 2>/dev/null)
            echo "Attempt $i: $R"
            echo "$R" | grep -q "HTTP:200" && echo "PASS — API is live!" && exit 0
            sleep 20
          done
          echo "Health check did not return 200 — check Railway dashboard logs."
          exit 0
