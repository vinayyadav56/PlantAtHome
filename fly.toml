app            = "plantathome-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_CHANNEL = "stderr"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "10s"
    grace_period = "5m"
    method       = "GET"
    path         = "/api/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
